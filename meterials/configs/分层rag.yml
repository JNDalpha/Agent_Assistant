    - data:
        code: "def main(chunks: list, embedding_json: list):\n    results = []\n\n\
          \    if not embedding_json:\n        return {\"data\": [], \"count\": 0}\n\
          \n    vectors = embedding_json[0].get(\"vector\", [])\n\n    length = min(len(chunks),\
          \ len(vectors))\n\n    for i in range(length):\n        chunk = chunks[i]\n\
          \        results.append({\n            \"id\": i + 1,\n            \"vector_768\"\
          : vectors[i],\n            \"vector_256\": vectors[i][:256],\n         \
          \   \"title\": chunk.get(\"title\"),\n            \"category\":\"none\"\
          ,\n            \"text\": chunk.get(\"text\")\n        })\n\n    return {\n\
          \        \"data\": results,\n    }\n"
