    - data:
        code: "import re\nimport json\n\nMAX_LEN = 400\nOVERLAP = 50\ndef main(text:\
          \ str):\n    max_len = MAX_LEN\n    results = []\n\n    # 按一级标题切分（保留标题）\n\
          \    sections = re.split(r'(?m)^# ', text)\n    \n    for section in sections:\n\
          \        section = section.strip()\n        if not section:\n          \
          \  continue\n\n        # 还原标题\n        section = \"# \" + section\n\n  \
          \      # 拆标题和正文\n        lines = section.splitlines()\n        title = lines[0].replace(\"\
          #\", \"\").strip()\n        content = \"\\n\".join(lines[1:]).strip()\n\n\
          \        if not content:\n            continue\n\n        # 如果正文不超过 max_len，直接放\n\
          \        if len(content) <= max_len:\n            results.append({\n   \
          \             \"title\": title,\n                \"text\": content\n   \
          \         })\n        else:\n            # 超过 max_len，顺序切分\n           \
          \ start = 0\n            while start < len(content):\n                chunk\
          \ = content[start:start + max_len]\n                results.append({\n \
          \                   \"title\": title,\n                    \"text\": chunk.strip()\n\
          \                })\n                start += max_len - OVERLAP\n\n    return\
          \ {\n    \"chunks\": results\n    }\n"
        code_language: python3
        outputs:
          chunks:
            children: null
            type: array[object]
